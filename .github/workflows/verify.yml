name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.0.0
        with:
          go-version-file: go.mod
      - run: go test ./...
      - name: Verify public source
        run: |
          forbidden_reference="$(printf '%s%s' 'po' 'lar')"
          if git grep -in "$forbidden_reference"; then
            exit 1
          fi
